name: ⚡ 快速更新 (Fast Mode - 每2h)

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger Cloudflare Pages cron
        run: curl -fsS -X GET "https://vspo-watch.pages.dev/api/cron?secret=${{ secrets.CRON_SECRET }}"
